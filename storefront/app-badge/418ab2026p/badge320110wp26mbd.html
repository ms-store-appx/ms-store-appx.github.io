<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Windows Store</title>
    <link rel="stylesheet" href="/storefront/ws2014ui26lmnt418.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        .search-bar { position: relative; display: inline-block; }
        #search-input { padding-right: 30px; width: 300px; height: 15px; font-size: 16px; }
        .search-bar i { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: gray; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <img src="/storefront/images/app/portal/ws2014logo26pp.png" alt="Store Logo">
            <a href="ms-store://" class="bgGreen"><h1>Home</h1></a>
            <a href="ms-store://" class="topLink"><h1>Top Charts</h1></a>
            <a href="ms-store://" class="topLink"><h1>Categories</h1></a>
            <a href="ms-store://" class="topLink"><h1>Collections</h1></a>
            <a href="ms-store://" class="topLink"><h1>Account</h1></a>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search for apps...">
           <a class="notLink" href="ms-store://"><i class="fa fa-search"></i></a>
        </div>
    </div>
	<pre id="codeBox">&lt;iframe src="https://ms-store-appx.github.io/storefront/app-badge/winstore2014/ab2012ws980312bf.html" width="320" height="110" frameborder="0"&gt;&lt;/iframe&gt;</pre>

	<button onclick="copyCode()">Copy</button>

	<script>
		function copyCode() {
    		var text = document.getElementById("codeBox").innerText;
    		navigator.clipboard.writeText(text);
    		alert("Copied!");
		}
	</script>

</body>
</html>
